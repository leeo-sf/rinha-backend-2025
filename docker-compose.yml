services:

  proxy:
    hostname: proxy
    container_name: proxy
    image: nginx:latest
    ports:
      - "9999:9999"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1
      - backend2
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "48MB"

  redis:
    image: redis:7.4
    hostname: redis
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: "86MB"

  backend1: &api-template
    image: leoof/rinha-backend
    container_name: backend1
    hostname: backend1
    restart: always
    depends_on:
      - redis
    ports:
      - 3000:8080
    environment:
      - Service__Redis__HostAndPort=redis:6379
      - Service__PaymentProcessorDefault__BASE_URL=http://payment-processor-default:8080
      - Service__PaymentProcessorFallback__BASE_URL=http://payment-processor-fallback:8080
    networks:
      - backend
      - payment-processor
    deploy:
      resources:
        limits:
          cpus: "0.6"
          memory: "108MB"

  backend2:
    <<: *api-template
    container_name: backend2
    hostname: backend2
    ports:
      - '3001:8080'
    environment:
      - Service__Redis__HostAndPort=redis:6379
      - Service__PaymentProcessorDefault__BASE_URL=http://payment-processor-default:8080
      - Service__PaymentProcessorFallback__BASE_URL=http://payment-processor-fallback:8080

volumes:
  redis-data:

networks:
  backend:
    driver: bridge
  payment-processor:
    external: true